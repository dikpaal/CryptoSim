version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"

  # Using existing TimescaleDB on host port 6543
  # timescaledb:
  #   image: timescale/timescaledb:latest-pg16
  #   ports:
  #     - "6543:5432"
  #   environment:
  #     - POSTGRES_DB=cryptosim
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=postgres
  #   volumes:
  #     - timescale_data:/var/lib/postgresql/data
  #     - ./migrations:/docker-entrypoint-initdb.d

  price-feed:
    build:
      context: .
      dockerfile: price-feed.Dockerfile
    environment:
      - SYMBOL=BTC-USD
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats

  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SYMBOL=BTC-USD
      - PORT=8080
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
      - price-feed

  persistence:
    build:
      context: .
      dockerfile: persistence/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - DB_HOST=host.docker.internal
      - DB_PORT=6543
      - DB_NAME=cryptosim
      - DB_USER=postgres
      - DB_PASSWORD=password
    depends_on:
      - nats
    extra_hosts:
      - "host.docker.internal:host-gateway"

  trader:
    build:
      context: .
      dockerfile: trader.Dockerfile
    environment:
      - TRADER_ID=trader-1
      - SYMBOL=BTC-USD
      - NATS_URL=nats://nats:4222
      - ORDERS_PER_SEC=100
      - MARKET_ORDER_RATIO=0.3
      - BUY_RATIO=0.5
      - MIN_QTY=0.01
      - MAX_QTY=0.1
      - AGGRESSIVE_LIMIT_BPS=5.0
      - MAX_IN_FLIGHT=100
      - REQUEST_TIMEOUT_MS=250
      - MATCH_FRIENDLY=true
      - P_HIT_MM=0.6
    depends_on:
      - nats
      - matching-engine

  mm-scalper:
    build:
      context: .
      dockerfile: mm.Dockerfile
      args:
        - MM_TYPE=mm-scalper
    environment:
      - MM_ID=mm-scalper
      - SYMBOL=BTC-USD
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
      - price-feed
      - matching-engine

  mm-momentum:
    build:
      context: .
      dockerfile: mm.Dockerfile
      args:
        - MM_TYPE=mm-momentum
    environment:
      - MM_ID=mm-momentum
      - SYMBOL=BTC-USD
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
      - price-feed
      - matching-engine

  mm-avstoikov:
    build:
      context: .
      dockerfile: mm.Dockerfile
      args:
        - MM_TYPE=mm-avstoikov
    environment:
      - MM_ID=mm-avstoikov
      - SYMBOL=BTC-USD
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
      - price-feed
      - matching-engine

volumes:
  timescale_data:
