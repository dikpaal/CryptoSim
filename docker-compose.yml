version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"

  matching-engine:
    build:
      context: .
      dockerfile: services/matching-engine/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SYMBOL=BTC-USD
      - PORT=8080
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
